spring:
  application:
    name: @artifactId@
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.1.100:8848
      config:
        file-extension: yml
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        shared-configs:
          - dataId: __common_.yml
            refresh: true
          - dataId: __common_database_.yml
            refresh: true
          - dataId: __common_redis_.yml
            refresh: true
          - dataId: __common_xxl_job_.yml
            refresh: true

